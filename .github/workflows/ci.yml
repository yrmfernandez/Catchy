name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q

  ml:
    name: ML · lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ../backend          # brings pydantic + the app package (featurizer)
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
      - name: Train model
        run: python -m catchy_ml.train
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: catchy-model
          path: ml/models/catchy_model.joblib
          if-no-files-found: error

  frontend:
    name: Frontend · typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t catchy-backend ./backend
      - name: Build frontend image
        run: docker build -t catchy-frontend ./frontend
